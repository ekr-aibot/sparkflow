<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sparkflow</title>
    <link rel="stylesheet" href="/static/xterm.css" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="header">
        <div id="brand">
          <span class="brand-mark">◈</span>
          <span class="brand-name">sparkflow</span>
        </div>
        <nav id="tabs" role="tablist" aria-label="open views"></nav>
      </header>

      <main id="main">
        <div id="chat" class="pane active" role="tabpanel" aria-label="chat"></div>
        <!-- job view panes are injected here as <div class="pane job-pane"> -->
      </main>

      <section id="status" aria-label="jobs">
        <div class="status-header">
          <h2 id="status-title">jobs</h2>
          <span id="job-count" class="job-count"></span>
          <div id="prefs" class="prefs">
            <label class="pref">
              <span class="pref-label">Chat:</span>
              <select id="pref-chat" class="pref-select" disabled title="Chat runtime switch lands in a follow-up commit">
                <option value="claude">Claude</option>
                <option value="gemini">Gemini</option>
              </select>
            </label>
            <label class="pref">
              <span class="pref-label">Jobs:</span>
              <select id="pref-jobs" class="pref-select">
                <option value="claude">Claude</option>
                <option value="gemini">Gemini</option>
              </select>
            </label>
          </div>
        </div>
        <ul id="job-list"></ul>
      </section>
    </div>
    <div id="tooltip" role="tooltip" aria-hidden="true"></div>
    <script type="module" src="/static/client.js"></script>
  </body>
</html>
