<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sparkflow</title>
    <link rel="stylesheet" href="/static/xterm.css" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="header">
        <div id="brand">
          <span class="brand-mark">◈</span>
          <span class="brand-name">sparkflow</span>
        </div>
        <nav id="tabs" role="tablist" aria-label="open views"></nav>
      </header>

      <main id="main">
        <div id="chat" class="pane active" role="tabpanel" aria-label="chat"></div>
        <!-- job view panes are injected here as <div class="pane job-pane"> -->
      </main>

      <section id="status" aria-label="jobs">
        <div class="status-header">
          <h2 id="status-title">jobs</h2>
          <span id="job-count" class="job-count"></span>
          <label id="monitor-toggle-label" class="monitor-toggle" hidden>
            <input id="pref-show-monitors" type="checkbox" />
            <span class="monitor-toggle-text">Show monitors</span>
            <span id="monitor-toggle-count" class="monitor-toggle-count"></span>
          </label>
          <div id="repo-selector" class="prefs">
            <label class="pref">
              <span class="pref-label">Repo:</span>
              <select id="repo-filter" class="pref-select"></select>
            </label>
            <label class="pref">
              <span class="pref-label">Chat:</span>
              <select id="pref-chat" class="pref-select" title="Switching resets the current chat session.">
                <option value="claude">Claude</option>
                <option value="gemini">Gemini</option>
              </select>
            </label>
            <label class="pref">
              <span class="pref-label">Jobs:</span>
              <select id="pref-jobs" class="pref-select">
                <option value="claude">Claude</option>
                <option value="gemini">Gemini</option>
              </select>
            </label>
          </div>
        </div>
        <ul id="job-list"></ul>
      </section>
    </div>
    <div id="tooltip" role="tooltip" aria-hidden="true"></div>
    <div id="chat-switch-modal" class="modal" hidden>
      <div class="modal-backdrop"></div>
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="chat-switch-title">
        <h3 id="chat-switch-title" class="modal-title">Switch chat model?</h3>
        <p class="modal-desc">This will end the current chat session for this repo.</p>
        <div class="modal-actions">
          <button id="chat-switch-cancel" class="btn btn-secondary">Cancel</button>
          <button id="chat-switch-confirm" class="btn btn-primary">Switch</button>
        </div>
      </div>
    </div>
    <script type="module" src="/static/client.js"></script>
  </body>
</html>
