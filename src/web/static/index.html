<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sparkflow</title>
    <link rel="stylesheet" href="/static/xterm.css" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="header">
        <div id="brand">
          <span class="brand-mark">◈</span>
          <span class="brand-name">sparkflow</span>
        </div>
        <nav id="tabs" role="tablist" aria-label="open views"></nav>
      </header>

      <main id="main">
        <div id="chat" class="pane active" role="tabpanel" aria-label="chat"></div>
        <!-- job view panes are injected here as <div class="pane job-pane"> -->
      </main>

      <section id="status" aria-label="jobs">
        <div class="status-header">
          <h2 id="status-title">jobs</h2>
          <span id="job-count" class="job-count"></span>
          <label id="monitor-toggle-label" class="monitor-toggle" hidden>
            <input id="pref-show-monitors" type="checkbox" />
            <span class="monitor-toggle-text">Show monitors</span>
            <span id="monitor-toggle-count" class="monitor-toggle-count"></span>
          </label>
          <div id="repo-selector" class="prefs" hidden>
            <label class="pref">
              <span class="pref-label">Repo:</span>
              <select id="repo-filter" class="pref-select"></select>
            </label>
          </div>
        </div>
        <ul id="job-list"></ul>
      </section>
    </div>
    <div id="tooltip" role="tooltip" aria-hidden="true"></div>
    <script type="module" src="/static/client.js"></script>
  </body>
</html>
